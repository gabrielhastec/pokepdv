name: CI - PokePDV

on:
  push:
    branches: [ main, develop, 'feat/**', 'fix/**', 'chore/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend:
    name: Backend - Java 17 + Maven
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pokepdv-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}
      - name: Testes + Cobertura JaCoCo
        run: mvn verify

  frontend:
    name: Frontend - Node 20 + Vite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pokepdv-admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run test
      - run: npm run build

  branch-name-check:
    name: Valida nomenclatura de branch
    runs-on: ubuntu-latest
    steps:
      - name: Check branch naming convention
        run: |
          BRANCH=${{ github.head_ref || github.ref_name }}
          if ! echo $BRANCH | grep -qE '^(main|develop|(feat|fix|chore|docs|test|refactor)/[a-z0-9-]+)$'; then
            echo 'Branch fora da convenção. Use: tipo/descricao-em-kebab'
            exit 1
          fi